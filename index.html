<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Assistant UniCAchatbot</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #header { background: #003576; color: white; padding: 20px; text-align: center; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .user { align-self: flex-end; background: #003576; color: white; }
        .ai { align-self: flex-start; background: white; border: 1px solid #ddd; }
        #input-area { padding: 20px; background: white; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #003576; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="header">Assistant Étudiant - Université Côte d'Azur</div>
    <div id="chat-box" id="chatBox">
        <div class="msg ai">Bonjour ! Posez-moi vos questions sur l'Université.</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Votre question...">
        <button onclick="sendMessage()">Envoyer</button>
    </div>

    <script>
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        if (!input.value) return;

        const userText = input.value;
        chatBox.innerHTML += `<div class="msg user">${userText}</div>`;
        input.value = '';

        try {
            const response = await fetch('https://frieda-isthmian-darci.ngrok-free.dev/api/v1/workspace/chatbotunica/chat', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer W4JJ4SX-P2YMHRH-G0FSH6M-HN2FAJY',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: userText, mode: 'chat' })
            });
            
            const data = await response.json();
            
            // On cherche la réponse texte dans data.textResponse ou data.content
            const aiReply = data.textResponse || data.content || "Je n'ai pas pu générer de réponse.";
            
            chatBox.innerHTML += `<div class="msg ai">${aiReply}</div>`;
        } catch (e) {
            console.error(e);
            chatBox.innerHTML += `<div class="msg ai">Erreur de communication avec l'IA.</div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
